<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Alterações</title>
    <link rel="stylesheet" href="{{ static_url('css/style.css') }}">
</head>
<body>

    <header class="app-header">
        📜 Histórico de Alterações
    </header>

    <main class="container">
        <div class="topo-clientes">
            <a href="/listar_cliente" class="btn-inicio">← Voltar</a>
        </div>

        <section class="add-card">
            <h2 class="titulo-lista">Registros do Sistema</h2>

            <table class="tabela-historico">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Tabela</th>
                        <th>Ação</th>
                        <th>Descrição</th>
                        <th>SQL</th> </tr>
                </thead>
                <tbody>
                {% for log in logs %}
                <tr>
                    <td>{{ log['data_hora'] }}</td>
                    <td>{{ log['tabela'] }}</td>
                    <td>
                        <span class="badge {{ log['classe_css'] }}">
                            {{ log['operacao'] }}
                        </span>
                    </td>
                    <td>{{ log['descricao'] }}</td>
                    <td>
                        <a href="/ver_sql/{{ log['id'] }}" class="btn-sql">Ver SQL</a>
                    </td>
                </tr>
                {% end %}
                </tbody>
            </table>
        </section>
    </main>

</body>
</html>
